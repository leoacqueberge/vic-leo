<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff1493">
  <title>Vic + Leo 💗</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="stickers" aria-hidden="true">
    <span class="sticker s1">💖</span>
    <span class="sticker s2">💘</span>
    <span class="sticker s3">💗</span>
    <span class="sticker s4">💞</span>
    <span class="sticker s5">💓</span>
    <span class="sticker s6">💝</span>
    <span class="sticker s7">✨</span>
    <span class="sticker s8">🍷</span>
    <span class="sticker s9">💕</span>
    <span class="sticker s10">💋</span>
  </div>

  <main class="app">
    <header class="header">
      <div class="vic-frame">
        <img src="vic.png" alt="Vic" class="vic-photo" width="140" height="140">
      </div>
      <h1 class="title">Vic <span class="plus">+</span> Leo</h1>
      <p class="tagline">✨ countdown des amoureux ✨</p>
    </header>

    <section class="screen">
      <div class="card">
        <p id="target-label" class="target-label"></p>
        <p id="location-label" class="location-label"></p>

        <div id="countdown-units" class="countdown">
          <div class="unit">
            <span id="days" class="unit-value">0</span>
            <span class="unit-label">jours</span>
          </div>
          <div class="unit">
            <span id="hours" class="unit-value">0</span>
            <span class="unit-label">heures</span>
          </div>
          <div class="unit">
            <span id="minutes" class="unit-value">0</span>
            <span class="unit-label">min</span>
          </div>
          <div class="unit">
            <span id="seconds" class="unit-value tick">0</span>
            <span class="unit-label">sec</span>
          </div>
        </div>

        <p id="fun-message" class="fun-message"></p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
