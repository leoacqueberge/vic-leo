<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff6b8a">
  <title>Vic + Leo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">Vic <span class="plus">+</span> Leo</h1>
    </header>

    <!-- Écran configuration -->
    <section id="setup-screen" class="screen">
      <div class="card">
        <p class="subtitle">Prochain rendez-vous</p>
        <form id="setup-form" class="form">
          <label class="field">
            <span class="label">Date</span>
            <input type="date" id="input-date" required>
          </label>
          <label class="field">
            <span class="label">Heure</span>
            <input type="time" id="input-time" required>
          </label>
          <label class="field">
            <span class="label">Lieu <span class="optional">(optionnel)</span></span>
            <input type="text" id="input-location" placeholder="Gare de Lyon, chez Vic…" maxlength="80">
          </label>
          <button type="submit" class="btn btn-primary">C'est parti !</button>
        </form>
      </div>
    </section>

    <!-- Écran décompte -->
    <section id="countdown-screen" class="screen hidden">
      <div class="card">
        <p id="target-label" class="target-label"></p>
        <p id="location-label" class="location-label hidden"></p>

        <div id="countdown-units" class="countdown">
          <div class="unit">
            <span id="days" class="unit-value">0</span>
            <span class="unit-label">jours</span>
          </div>
          <div class="unit">
            <span id="hours" class="unit-value">0</span>
            <span class="unit-label">heures</span>
          </div>
          <div class="unit">
            <span id="minutes" class="unit-value">0</span>
            <span class="unit-label">min</span>
          </div>
          <div class="unit">
            <span id="seconds" class="unit-value tick">0</span>
            <span class="unit-label">sec</span>
          </div>
        </div>

        <p id="fun-message" class="fun-message"></p>

        <button type="button" id="edit-btn" class="btn btn-secondary">Modifier</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
